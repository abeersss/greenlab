<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GreenLab Puzzles</title><style>body{margin:0;background:#f2fbff;color:#102b47;font-family:Arial}.w{max-width:1120px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between}.brand{font-weight:bold;color:#082d59;text-decoration:none;font-size:21px}.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:18px 0}.tab{padding:12px 6px;text-align:center;border:0;border-radius:11px;color:#fff;font-weight:bold;text-decoration:none;cursor:pointer}.network{background:#2876c8}.soc{background:#ed645d}.cloud{background:#8052bb}.ai{background:#1a9b70}.dev{background:#e99a2c}.tab.active{outline:4px solid #c9fff0}.hero{background:#082d59;color:#fff;border-radius:20px;padding:26px}.hero small{color:#57f0bc}.layout{display:grid;grid-template-columns:1.5fr .75fr;gap:18px;margin-top:18px}.panel{background:#fff;border:1px solid #c8ddec;border-radius:17px;padding:18px}.zones{display:grid;grid-template-columns:1fr 1fr;gap:11px}.zone{padding:12px;border:2px solid var(--c);background:var(--bg);border-radius:12px}.zone p{font-size:12px;color:#577590;min-height:28px}.drop{height:46px;border:2px dashed var(--c);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#6889a4}.card{padding:12px;border-radius:10px;background:var(--c);color:#fff;font-weight:bold;margin:9px 0;cursor:grab}.placed{background:#102b47;color:#fff;width:100%;padding:8px;border-radius:7px;text-align:center}.check{padding:11px;border:0;border-radius:9px;background:#2ad59b;font-weight:bold}.foot{margin-top:22px;padding:15px;background:#effff9;border:1px solid #a9e8d0;border-radius:13px;font-size:13px;color:#315d54}@media(max-width:700px){.tabs,.zones{grid-template-columns:1fr}.layout{grid-template-columns:1fr}}</style></head><body><main class="w"><header class="top"><a class="brand" href="index.html">💡 GREENLAB</a><a href="index.html#network">Home</a></header><section class="hero"><small>LEARN BY DOING</small><h1 id="title">SOC Analyst Puzzle</h1><p id="intro">Match each action to the correct situation.</p></section><nav class="tabs"><a class="tab network" href="index.html#network">Network</a><button class="tab soc active" data-i="0">SOC</button><button class="tab cloud" data-i="1">Cloud</button><button class="tab ai" data-i="2">AI</button><button class="tab dev" data-i="3">DevSecOps</button></nav><section class="layout"><article class="panel"><h2>Scenario board</h2><div class="zones" id="zones"></div></article><aside class="panel"><h2>Actions to place</h2><div id="cards"></div><button class="check" id="check">Check answer</button><p id="feedback"></p></aside></section><footer class="foot"><b>Dr. Abeer Alshammari, CISSP, CISM</b><br>IT Audit & GRC Consultant · Abeer GRC Platform · Dr. A Tech daily cybersecurity newsletter</footer></main><script>const P=[['SOC Analyst Puzzle','Match each response action to the right incident.',[['🚨 Suspicious alert','Unusual location sign-in.','Triage','#ed645d','#fff2f1'],['🦠 Malware','Infected workstation online.','Contain','#e99a2c','#fff8e9'],['🧾 Evidence','Logs are required.','Investigate','#2876c8','#eef7ff'],['✅ Closed incident','Record lessons learned.','Document','#1a9b70','#edfff8']]],['Cloud Security Puzzle','Match each control to its cloud situation.',[['🪣 Storage','Bucket must not be public.','Restrict access','#8052bb','#f6efff'],['👤 Account','Admin needs stronger protection.','Enable MFA','#2876c8','#eef7ff'],['💾 Data','Customer data in cloud.','Encrypt data','#ed645d','#fff2f1'],['📡 Activity','Team needs visibility.','Enable logging','#1a9b70','#edfff8']]],['AI Security Puzzle','Match each safeguard to the AI component.',[['⌨️ Input','Learner enters prompt.','Input guardrails','#ed645d','#fff2f1'],['🗂️ Data','Dataset needs review.','Review data','#e99a2c','#fff8e9'],['🔑 Access','Only approved users.','Set permissions','#8052bb','#f6efff'],['💬 Output','Response needs checks.','Safety filter','#1a9b70','#edfff8']]],['DevSecOps Puzzle','Match security checks to delivery steps.',[['💻 Code','Developer pushes code.','Run SAST','#2876c8','#eef7ff'],['🗝️ Secrets','Password may commit.','Scan secrets','#ed645d','#fff2f1'],['📦 Package','Third-party library.','Check dependencies','#e99a2c','#fff8e9'],['☁️ Deploy','Infrastructure release.','Scan IaC','#1a9b70','#edfff8']]]];let n=0;const $=x=>document.getElementById(x);function render(){let p=P[n];$('title').textContent=p[0];$('intro').textContent=p[1];$('zones').innerHTML=p[2].map(x=>'<div class="zone" style="--c:'+x[3]+';--bg:'+x[4]+'"><b>'+x[0]+'</b><p>'+x[1]+'</p><div class="drop" data-a="'+x[2]+'">Drop action here</div></div>').join('');$('cards').innerHTML=p[2].map(x=>'<div class="card" draggable="true" data-a="'+x[2]+'" style="--c:'+x[3]+'">'+x[2]+'</div>').join('');document.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>{n=+b.dataset.i;render()});document.querySelectorAll('.card').forEach(c=>c.ondragstart=e=>e.dataTransfer.setData('text/plain',c.dataset.a));document.querySelectorAll('.drop').forEach(d=>{d.ondragover=e=>e.preventDefault();d.ondrop=e=>{e.preventDefault();let a=e.dataTransfer.getData('text/plain');if(d.firstChild&&d.firstChild.className==='placed')return;d.innerHTML='<div class="placed" data-a="'+a+'">'+a+'</div>';let c=document.querySelector('.card[data-a="'+a+'"]');if(c)c.style.display='none'}});$('check').onclick=()=>{let s=0;document.querySelectorAll('.drop').forEach(d=>{let z=d.querySelector('.placed');if(z&&z.dataset.a===d.dataset.a)s++});$('feedback').textContent=s===4?'Excellent! +50 XP':s+' of 4 are correct.'}}render();</script></body></html>
